name: Test DynamoDB Local Counter

on:
  push:
    branches:
      - main

jobs:
  dynamodb-local-test:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AWS CLI & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli jq

      - name: Create DynamoDB Table
        run: |
          aws dynamodb create-table \
            --table-name repo-branch-counters \
            --attribute-definitions AttributeName=repo_name,AttributeType=S AttributeName=branch_name,AttributeType=S \
            --key-schema AttributeName=repo_name,KeyType=HASH AttributeName=branch_name,KeyType=RANGE \
            --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 \
            --endpoint-url http://localhost:8000

      - name: Increment Counter (Atomic)
        run: |
          aws dynamodb update-item \
            --table-name repo-branch-counters \
            --key '{"repo_name": {"S": "my-org/my-repo"}, "branch_name": {"S": "main"}}' \
            --update-expression "SET counter = if_not_exists(counter, :zero) + :inc" \
            --expression-attribute-values '{":inc": {"N": "1"}, ":zero": {"N": "0"}}' \
            --return-values UPDATED_NEW \
            --endpoint-url http://localhost:8000

      - name: Get Counter Value
        run: |
          aws dynamodb get-item \
            --table-name repo-branch-counters \
            --key '{"repo_name": {"S": "my-org/my-repo"}, "branch_name": {"S": "main"}}' \
            --endpoint-url http://localhost:8000 | jq
